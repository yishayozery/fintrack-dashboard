<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד פיננסי — ישי עוזרי</title>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ========== AUTH SCREEN ========== -->
<div id="authScreen" style="display:none;">
  <!-- Email verification overlay (shown after registration) -->
  <div id="emailVerifyStep" style="display:none;position:absolute;inset:0;z-index:10;background:rgba(10,15,30,0.98);align-items:center;justify-content:center;">
    <div class="auth-card" style="text-align:center;">
      <div style="font-size:3em;margin-bottom:12px;">📧</div>
      <h2 class="auth-title" style="font-size:1.3em;">אמת את כתובת המייל שלך</h2>
      <p style="color:#94a3b8;font-size:14px;margin:0 0 20px;line-height:1.6;">
        שלחנו קישור אימות לכתובת<br>
        <strong id="verifyEmailDisplay" style="color:#60a5fa;"></strong>
      </p>
      <div style="background:#0f172a;border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid #334155;">
        <p style="color:#94a3b8;font-size:13px;margin:0 0 12px;">הזן את הקוד שקיבלת במייל:</p>
        <input id="verifyCodeInput" type="text" maxlength="6" placeholder="000000"
          style="width:160px;text-align:center;font-size:2em;letter-spacing:12px;border:2px solid #3b82f6;border-radius:10px;padding:12px;background:#1e293b;color:white;"/>
      </div>
      <p style="color:#94a3b8;font-size:12px;">A 6-digit code has been sent to your email. Please enter it here.</p>
      <button id="verifyButton" class="btn-action" style="width:200px;padding:12px 18px;font-size:14px;cursor:pointer;margin-top:12px;">Verify</button>
    </div>
  
   5-- Registration Form -->
    <div class="auth-card" style="display:none;">
      <h1 class="auth-title">פיאשננסבזל</h1>
      <div class="aauth-section">
        <label style="display:block;margin-bottom:6px;color:#94a3b8;">נד סורב ייזובלת</label>
        <input type="text" id="register_name_input" spellcheck="false" placeholder="Name" style="width:100%;padding:18px 12px;margin-bottom:12px;border:1px solid #334155;border-radius:30px;background:rgba(255,255,255,0.1);color:#fff;font-size:14px;box-sizing:border-box;" />
      </div>
      <div class="aauth-section">
        <label style="display:block;margin-bottom:6px;color:#94a3b8;">缩域间</label>
        <input type="email" id="register_email_input" placeholder="Email" spellcheck="false" style="width:100%;padding:18px 12px;margin-bottom:12px;border:1px solid #334155;border-radius:30px;background:rgba(255,255,255,0.1);color:#fff;font-size:14px;box-sizing:border-box;" />
        </div>
        <div class="aauth-section">
          <label style="display:block;margin-bottom:6px;color:#94a3b8;">栐在冰次</label>
          <input type="password" id="register_password_input" placeholder="栐在冰次" style="width:100%;padding:18px 12px;margin-bottom:12px;border:1px solid #334155;border-radius:30px;background:rgba(255,255,255,0.1);color:#fff;font-size:14px;box-sizing:border-box;" />
        </div>
        <div class="aauth-section">
          <label style="display:block;margin-bottom:6px;color:#94a3b8;">砐圩憐歡</label>
          <input type="password" id="register_password_confirm_input" placeholder="渧在憐歡" style="width:100%;padding:18px 12px;margin-bottom:12px;border:1px solid #334155;border-radius:30px;background:rgba(255,255,255,0.1);color:#fff;font-size:14px;box-sizing:border-box;" />
        </div>
      </div>
      <button id="register_button" class="btn-action" style="width:100%;padding:12px 18px;font-size:14px;cursor:pointer;margin-top:24px;">Join Now</button>
    </div>
  
  
   5-- Login Form -->
    <div class="auth-card">
      <h1 class="auth-title">用户</h1>
      <div class="aauth-section">
        <label style="display:block;margin-bottom:6px;color:#94a3b8;">砐在冰次</label>
        <input type="email" id="login_email_input" placeholder="Email" spellcheck="false" style="width:100%;padding:18px 12px;margin-bottom:12px;border:1px solid #334155;border-radius:30px;background:rgba(255,255,255,0.1);color:#fff;font-size:14px;box-sizing:border-box;" />
      </div>
        <div class="aauth-section">
          <label style="display:block;margin-bottom:6px;color:#94a3b8;">栐在冰次</label>
          <input type="password" id="login_password_input" placeholder="栐在冰次" style="width:100%;padding:18px 12px;margin-bottom:12px;border:1px solid #334155;border-radius:30px;background:rgba(255,255,255,0.1);color:#fff;font-size:14px;box-sizing:border-box;" />
        </div>
      <button id="login_button" class="btn-action" style="width:100%;padding:12px 18px;font-size:14px;cursor:pointer;margin-top:24px;">用户</button>
    </div>
  
  
   5-- Dashboard Screen -->
  
  
  
  
</body>
