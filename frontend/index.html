<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack — כניסה למערכת</title>
<style>
  :root {
    --primary:#2563eb; --primary-dark:#1d4ed8;
    --success:#16a34a; --danger:#dc2626;
    --gray-50:#f8fafc; --gray-100:#f1f5f9; --gray-200:#e2e8f0;
    --gray-500:#64748b; --gray-800:#1e293b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:520px;padding:40px;animation:slideUp .4s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .logo{text-align:center;margin-bottom:28px;}
  .logo h1{font-size:28px;font-weight:800;color:var(--primary);}
  .logo p{font-size:14px;color:var(--gray-500);margin-top:4px;}
  .tabs{display:flex;background:var(--gray-100);border-radius:10px;padding:4px;margin-bottom:28px;gap:4px;}
  .tab-btn{flex:1;padding:10px;border:none;background:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:var(--gray-500);transition:all .2s;}
  .tab-btn.active{background:#fff;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.1);}
  .form-section{display:none;}
  .form-section.active{display:block;}
  .step{display:none;}
  .step.active{display:block;}
  .step-indicator{display:flex;align-items:center;margin-bottom:24px;gap:8px;}
  .step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .step-dot.done{background:var(--success);color:#fff;}
  .step-dot.active{background:var(--primary);color:#fff;}
  .step-dot.pending{background:var(--gray-200);color:var(--gray-500);}
  .step-line{flex:1;height:2px;background:var(--gray-200);}
  .step-line.done{background:var(--success);}
  .step-title{font-size:18px;font-weight:700;color:var(--gray-800);margin-bottom:6px;}
  .step-sub{font-size:13px;color:var(--gray-500);margin-bottom:20px;}
  .field{margin-bottom:16px;}
  label{display:block;font-size:13px;font-weight:600;color:var(--gray-800);margin-bottom:5px;}
  label span.req{color:var(--danger);}
  input,select{width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:9px;font-size:14px;font-family:inherit;transition:border .15s;background:#fff;color:var(--gray-800);}
  input:focus,select:focus{outline:none;border-color:var(--primary);}
  input.err,select.err{border-color:var(--danger);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-secondary{background:var(--gray-100);color:var(--gray-800);}
  .btn-secondary:hover{background:var(--gray-200);}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;}
  .alert{padding:12px 16px;border-radius:9px;font-size:13px;margin-bottom:16px;display:none;}
  .alert.err{background:#fef2f2;border:1px solid #fecaca;color:var(--danger);}
  .alert.ok{background:#f0fdf4;border:1px solid #86efac;color:var(--success);}
  .optional-badge{font-size:11px;background:var(--gray-100);color:var(--gray-500);border-radius:10px;padding:1px 7px;font-weight:500;margin-right:4px;}
  .progress-bar{height:4px;background:var(--gray-200);border-radius:4px;margin-bottom:24px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .3s;}
  .info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px;font-size:13px;color:#1d4ed8;margin-bottom:16px;line-height:1.7;}
  .info-box strong{display:block;margin-bottom:4px;}
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>💰 FinTrack</h1>
    <p>מערכת ניהול פיננסי אישי</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('login')">🔐 כניסה</button>
    <button class="tab-btn"        onclick="showTab('register')">📝 הרשמה</button>
  </div>

  <!-- ═══════════════ LOGIN ═══════════════ -->
  <div id="loginSection" class="form-section active">
    <div id="loginAlert" class="alert err"></div>
    <div class="field">
      <label>שם משתמש <span class="req">*</span></label>
      <input id="loginUser" type="text" placeholder="הכנס שם משתמש" autocomplete="username">
    </div>
    <div class="field">
      <label>סיסמה <span class="req">*</span></label>
      <input id="loginPass" type="password" placeholder="הכנס סיסמה" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" id="loginBtn">🚀 כניסה למערכת</button>
  </div>

  <!-- ═══════════════ REGISTER (3 steps) ═══════════════ -->
  <div id="registerSection" class="form-section">
    <div class="progress-bar"><div class="progress-fill" id="regProgress" style="width:33%"></div></div>

    <!-- Step indicators -->
    <div class="step-indicator">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot pending" id="dot2">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot pending" id="dot3">3</div>
    </div>

    <div id="regAlert" class="alert err"></div>

    <!-- STEP 1 — credentials -->
    <div id="regStep1" class="step active">
      <div class="step-title">🔑 פרטי כניסה</div>
      <div class="step-sub">אלה הפרטים שתשתמש בהם להתחבר</div>
      <div class="field">
        <label>שם משתמש <span class="req">*</span></label>
        <input id="rUser" type="text" placeholder="לפחות 3 תווים, אנגלית בלבד" autocomplete="username">
      </div>
      <div class="field">
        <label>אימייל <span class="req">*</span></label>
        <input id="rEmail" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field-row">
        <div class="field">
          <label>סיסמה <span class="req">*</span></label>
          <input id="rPass" type="password" placeholder="לפחות 8 תווים" autocomplete="new-password">
        </div>
        <div class="field">
          <label>אימות סיסמה <span class="req">*</span></label>
          <input id="rPass2" type="password" placeholder="חזור על הסיסמה" autocomplete="new-password">
        </div>
      </div>
      <button class="btn btn-primary" onclick="regNext(1)" style="margin-top:8px;">הבא ←</button>
    </div>

    <!-- STEP 2 — personal info -->
    <div id="regStep2" class="step">
      <div class="step-title">👤 פרטים אישיים</div>
      <div class="step-sub">מידע שעוזר לנו לתת לך המלצות מדויקות יותר</div>
      <div class="field-row">
        <div class="field">
          <label>שם מלא <span class="req">*</span></label>
          <input id="rName" type="text" placeholder="ישי כהן">
        </div>
        <div class="field">
          <label>טלפון <span class="optional-badge">אופציונלי</span></label>
          <input id="rPhone" type="tel" placeholder="050-0000000">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>עיר מגורים</label>
          <input id="rCity" type="text" placeholder="תל אביב">
        </div>
        <div class="field">
          <label>סוג מגורים</label>
          <select id="rHousing">
            <option value="">בחר...</option>
            <option value="owned">בעלות</option>
            <option value="rented">שכירות</option>
            <option value="parents">אצל הורים</option>
            <option value="other">אחר</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>מצב משפחתי</label>
          <select id="rFamily">
            <option value="">בחר...</option>
            <option value="single">רווק/ה</option>
            <option value="married">נשוי/אה</option>
            <option value="divorced">גרוש/ה</option>
            <option value="widowed">אלמן/ה</option>
          </select>
        </div>
        <div class="field">
          <label>מספר ילדים</label>
          <select id="rChildren">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5+</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="regBack(2)">→ חזרה</button>
        <button class="btn btn-primary"   onclick="regNext(2)">הבא ←</button>
      </div>
    </div>

    <!-- STEP 3 — financial profile -->
    <div id="regStep3" class="step">
      <div class="step-title">💼 פרופיל פיננסי</div>
      <div class="step-sub">מסייע לנו לכייל המלצות לפי מצבך</div>
      <div class="info-box">
        <strong>🔒 פרטיות מלאה</strong>
        המידע הזה גלוי למנהל המערכת בלבד ולא משותף עם אף גורם חיצוני.
      </div>
      <div class="field-row">
        <div class="field">
          <label>סוג תעסוקה</label>
          <select id="rEmploy">
            <option value="">בחר...</option>
            <option value="employed">שכיר/ה</option>
            <option value="self-employed">עצמאי/ת</option>
            <option value="business-owner">בעל/ת עסק</option>
            <option value="retired">גמלאי/ת</option>
            <option value="student">סטודנט/ית</option>
            <option value="other">אחר</option>
          </select>
        </div>
        <div class="field">
          <label>טווח הכנסה חודשי</label>
          <select id="rIncome">
            <option value="">בחר...</option>
            <option value="<10k">עד ₪10,000</option>
            <option value="10-20k">₪10,000 – ₪20,000</option>
            <option value="20-30k">₪20,000 – ₪30,000</option>
            <option value="30-50k">₪30,000 – ₪50,000</option>
            <option value="50k+">מעל ₪50,000</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="regBack(3)">→ חזרה</button>
        <button class="btn btn-primary"   onclick="doRegister()" id="regBtn">✅ הרשמה וכניסה</button>
      </div>
    </div>
  </div><!-- /registerSection -->
</div><!-- /card -->

<script>
const API = 'http://localhost:8000';   // ← שנה לכתובת השרת שלך בפרודקשן

// ── Tab switch ───────────────────────────────────────────────────────
function showTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['login','register'][i]===t));
  document.getElementById('loginSection').classList.toggle('active', t==='login');
  document.getElementById('registerSection').classList.toggle('active', t==='register');
}

// ── Alert helpers ────────────────────────────────────────────────────
function showAlert(id, msg, type='err'){
  const el=document.getElementById(id);
  el.textContent=msg; el.className='alert '+(type==='ok'?'ok':'err'); el.style.display='block';
  setTimeout(()=>{ el.style.display='none'; }, 5000);
}

// ── Step navigation ──────────────────────────────────────────────────
let regCurrentStep = 1;

function setStep(n){
  for(let i=1;i<=3;i++){
    document.getElementById('regStep'+i).classList.toggle('active', i===n);
    const dot=document.getElementById('dot'+i);
    dot.className='step-dot '+(i<n?'done':i===n?'active':'pending');
    if(i<3) document.getElementById('line'+i).className='step-line '+(i<n?'done':'');
  }
  document.getElementById('regProgress').style.width=(n/3*100)+'%';
  regCurrentStep=n;
}

function regNext(from){
  document.getElementById('regAlert').style.display='none';
  if(from===1){
    const u=v('rUser'),e=v('rEmail'),p=v('rPass'),p2=v('rPass2');
    if(!u||u.length<3)  return showAlert('regAlert','שם משתמש חייב להכיל לפחות 3 תווים');
    if(!e||!e.includes('@')) return showAlert('regAlert','כתובת אימייל לא תקינה');
    if(!p||p.length<8)  return showAlert('regAlert','סיסמה חייבת להכיל לפחות 8 תווים');
    if(p!==p2)          return showAlert('regAlert','הסיסמאות אינן תואמות');
  }
  if(from===2){
    if(!v('rName')) return showAlert('regAlert','נא הכנס שם מלא');
  }
  setStep(from+1);
}

function regBack(from){ setStep(from-1); }

function v(id){ return (document.getElementById(id)||{}).value||''; }

// ── LOGIN ────────────────────────────────────────────────────────────
async function doLogin(){
  const btn=document.getElementById('loginBtn');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> מתחבר...';
  try {
    const res = await fetch(API+'/auth/login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username:v('loginUser'), password:v('loginPass') })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail||'שגיאת התחברות');
    localStorage.setItem('ft_token', data.access_token);
    localStorage.setItem('ft_user',  JSON.stringify({id:data.user_id, username:data.username, is_admin:data.is_admin}));
    window.location.href = 'dashboard.html';
  } catch(e){
    showAlert('loginAlert', e.message);
  } finally {
    btn.disabled=false; btn.innerHTML='🚀 כניסה למערכת';
  }
}

// ── REGISTER ─────────────────────────────────────────────────────────
async function doRegister(){
  const btn=document.getElementById('regBtn');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> נרשם...';
  const payload = {
    username:             v('rUser'),
    email:                v('rEmail'),
    password:             v('rPass'),
    full_name:            v('rName')  || null,
    phone:                v('rPhone') || null,
    city:                 v('rCity')  || null,
    family_status:        v('rFamily')|| null,
    num_children:         parseInt(v('rChildren'))||0,
    employment_type:      v('rEmploy')|| null,
    monthly_income_range: v('rIncome')|| null,
    housing_type:         v('rHousing')||null,
  };
  try {
    const res = await fetch(API+'/auth/register',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail||'שגיאת הרשמה');
    localStorage.setItem('ft_token', data.access_token);
    localStorage.setItem('ft_user',  JSON.stringify({id:data.user_id, username:data.username, is_admin:data.is_admin}));
    showAlert('regAlert','✅ נרשמת בהצלחה! מעביר לדשבורד...','ok');
    setTimeout(()=>{ window.location.href='dashboard.html'; }, 1500);
  } catch(e){
    showAlert('regAlert', e.message);
  } finally {
    btn.disabled=false; btn.innerHTML='✅ הרשמה וכניסה';
  }
}

// ── Auto-redirect if already logged in ───────────────────────────────
if(localStorage.getItem('ft_token')){
  window.location.href='dashboard.html';
}
</script>
</body>
</html>
